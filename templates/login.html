{% extends "base.html" %}
{% block content %}
  <section class="panel">
    <div class="panel-header">
      <h2>Login</h2>
      <p class="muted">Access your dashboard and prediction history.</p>
    </div>

    <form class="form" method="post" action="{{ url_for('login_post') }}" novalidate>
      <div class="grid-2">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required placeholder="you@example.com" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required placeholder="Your password" />
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-primary" type="submit">Login</button>
        <a class="btn btn-ghost" href="{{ url_for('register') }}">Create account</a>
      </div>
    </form>
  </section>
{% endblock %}
