{% extends "base.html" %}
{% block content %}
  <section class="panel">
    <div class="panel-header">
      <h2>Create account</h2>
      <p class="muted">Register as a Patient or Doctor.</p>
    </div>

    <form class="form" method="post" action="{{ url_for('register_post') }}" novalidate>
      <div class="grid-2">
        <div class="field">
          <label for="name">Full name</label>
          <input id="name" name="name" type="text" required minlength="2" placeholder="Your name" />
        </div>
        <div class="field">
          <label for="role">Role</label>
          <select id="role" name="role" required>
            <option value="" selected disabled>Select</option>
            <option value="patient">Patient</option>
            <option value="doctor">Doctor</option>
          </select>
        </div>
      </div>

      <div class="grid-2">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required placeholder="you@example.com" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required minlength="6" placeholder="Min 6 chars" />
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" type="submit">Register</button>
        <a class="btn btn-ghost" href="{{ url_for('login') }}">Already have an account?</a>
      </div>
    </form>
  </section>
{% endblock %}
